                      - generic [ref=e668]: Colleen H.
                      - generic [ref=e669]: 1 month ago
                    - generic [ref=e670]: I found Wet Walls Works online because my shower recess had been leaking for years into the bedroom wall. I hate tiles and grout and wanted an alternative that is easy to clean. Unfortunately there was no installer in our area so I had to do it myself. I am a 71 year old woman so was terrified about doing all the measurements for fitting the tap and shower head part. Grandson to the rescue for that part. We made a few mistakes and didn’t end up putting the corner piece in because my waterproofing was a bit messy so it threw out the measurements but that was ok we just used silicone sealer instead. These panels are meant to go straight over the tiles which would have been very simple but because I wanted to change the taps to a mixer and the shower head to a post and rail it meant the tiles had to come off which made things a little more difficult. I am very happy with the finished product and ended up buying another panel so I could put it around the basin area and the sides of the cupboards which makes it all look so much nicer. I still have some panel left so today I am going to put it inside my cupboards because the chipboard in there is all rubbish and crumbling. Overall I highly recommend this product because it makes the bathroom look so much better but I would recommend just putting straight over the tiles if you can.
