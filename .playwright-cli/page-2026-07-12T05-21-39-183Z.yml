            - strong: Terms and Conditions for Wet Wall Works Tool Kit Redemption Offer
          - paragraph:
            - strong: 1. Promotion Overview
          - paragraph: This promotional offer ("Offer") is available exclusively through WetWallWorks.com.au ("Website"). Customers who purchase 10 or more full-priced 2.4m Wet Wall panels ("Eligible Purchase") will qualify for a free tool kit ("Free Tool Kit") valued at over $130, subject to these Terms and Conditions.
          - paragraph:
            - strong: 2. Eligibility
          - paragraph: "To be eligible for this Offer, customers must meet the following requirements:"
          - list:
            - listitem: The customer must purchase a minimum of 10 full-priced 2.4m Wet Wall panels in a single transaction from WetWallWorks.com.au.
            - listitem: The customer must complete the purchase during the promotional period (as defined below).
            - listitem: The customer must complete the purchase via WetWallWorks.com.au (orders made via third-party sites or retailers do not qualify).
            - listitem: The Free Tool Kit is available while stocks last and subject to availability.
          - paragraph:
            - strong: 3. Promotional Period
          - paragraph: This Offer is valid from 01/04/2025 00:00 to 01/05/2025 00:00, or until stocks of the Free Tool Kit are exhausted, whichever comes first. Wet Wall Works reserves the right to modify or cancel the promotion at any time without prior notice.
          - paragraph:
            - strong: 4. Free Tool Kit
          - paragraph:
            - text: The Free Tool Kit will be provided to eligible customers upon successful completion of their Eligible Purchase and completion of the redemption form that can be found
            - link "here":
              - /url: https://wetwallworks.com.au/promotions/
            - text: . The tool kit will be delivered via Australia Post separately to the purchased Wet Wall panels. Wet Wall Works will not be responsible for any issues related to the delivery of the Free Tool Kit.
          - paragraph:
            - strong: 5. Non-Transferable
          - paragraph: This Offer is non-transferable and may only be redeemed by the customer who made the Eligible Purchase. It is not valid in conjunction with any other promotions, discounts, or offers unless specifically stated by Wet Wall Works.
          - paragraph:
            - strong: 6. Returns and Cancellations
          - list:
            - listitem: If the customer returns any items from their Eligible Purchase (i.e. 1 Wet Wall panel), the customer will forfeit the Free Tool Kit and must return the Free Tool Kit at their own expense.
            - listitem: If the entire order is cancelled or returned, the Offer will be void, and the customer will not receive the Free Tool Kit or return the Free Tool Kit at their own expense if already dispatched.
          - paragraph:
            - strong: 7. Limitation of Liability
          - paragraph: Wet Wall Works is not responsible for any issues, damages, or losses that arise from the use of the Free Tool Kit. Customers should follow all manufacturer instructions for the tool kit and use it at their own risk.
          - paragraph:
            - strong: 8. Privacy and Data Collection
          - paragraph:
            - text: By participating in this Offer, customers agree to the collection and use of their personal information by Wet Wall Works for the purposes of processing the Offer. All personal data will be handled in accordance with Wet Wall Works's
            - link "Privacy Policy":
              - /url: https://wetwallworks.com.au/privacy-policy/
            - text: .
          - paragraph:
            - strong: 9. General Terms
          - list:
            - listitem: Wet Wall Works reserves the right to amend, extend, or cancel this Offer at any time without prior notice.
            - listitem: Wet Wall Works may, at its discretion, substitute the Free Tool Kit with another item of equal or greater value.
            - listitem: Any misuse of this Offer or violation of these Terms and Conditions may result in disqualification from the promotion.
          - paragraph:
            - strong: 10. Contact
          - paragraph:
            - text: For any inquiries or questions related to this Offer, customers can contact Wet Wall Works’s customer support team at
            - link "info@wetwallworks.com.au":
              - /url: mailto:info@wetwallworks.com.au
            - text: or 1800 NO TILE (1800 668 453).
          - paragraph:
            - strong: 11. Governing Law
          - paragraph: These Terms and Conditions are governed by the laws of Australia. Any disputes arising from this Offer will be subject to the exclusive jurisdiction of the courts of Australia.
          - paragraph:
            - strong: By participating in this Offer, you agree to be bound by these Terms and Conditions.
